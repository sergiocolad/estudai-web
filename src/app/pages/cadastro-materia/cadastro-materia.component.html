<div class="container">
  <h2>Cadastro de Matéria</h2>

  <form [formGroup]="materiaForm" (ngSubmit)="adicionarMateria()">
    <mat-form-field appearance="fill">
      <mat-label>Nome da matéria</mat-label>
      <input matInput placeholder="Ex: História" formControlName="nome" />
    </mat-form-field>

    <button mat-raised-button color="primary" type="submit">Salvar</button>
  </form>

  <ul *ngIf="materias.length">
    <li *ngFor="let materia of materias; let i = index">
      {{ materia }}
      <button mat-button color="warn" (click)="removerMateria(i)">Remover</button>
    </li>
  </ul>
</div>
